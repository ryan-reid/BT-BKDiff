name: Amazon Skill Tests

on:
  push:
    paths:
      - "scripts/**"
      - "tests/**"
      - ".github/workflows/amazon-skill-tests.yml"
  pull_request:
    paths:
      - "scripts/**"
      - "tests/**"
      - ".github/workflows/amazon-skill-tests.yml"
  workflow_dispatch:

jobs:
  amazon-skill-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Amazon skill regression test
        run: python -m unittest tests.test_amazon_skill_tree_service
